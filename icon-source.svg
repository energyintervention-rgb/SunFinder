<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1E3D"/>
      <stop offset="55%" stop-color="#15294F"/>
      <stop offset="100%" stop-color="#FF8A1E"/>
    </linearGradient>
    <radialGradient id="sun" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFE9B0"/>
      <stop offset="55%" stop-color="#FFC15C"/>
      <stop offset="100%" stop-color="#FF9B2E"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB35C"/>
      <stop offset="50%" stop-color="#FFD27A"/>
      <stop offset="100%" stop-color="#FFB35C"/>
    </linearGradient>
  </defs>

  <!-- background with rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- sun rays -->
  <g stroke="#FFC15C" stroke-width="14" stroke-linecap="round">
    <line x1="256" y1="118" x2="256" y2="156"/>
    <line x1="166" y1="150" x2="192" y2="176"/>
    <line x1="346" y1="150" x2="320" y2="176"/>
    <line x1="118" y1="240" x2="156" y2="240"/>
    <line x1="356" y1="240" x2="394" y2="240"/>
  </g>

  <!-- sun body -->
  <circle cx="256" cy="262" r="78" fill="url(#sun)"/>

  <!-- horizon curve -->
  <path d="M 78 300 Q 256 248 434 300" stroke="url(#horizon)" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- compass arrow, split white/orange, pointing up -->
  <g transform="translate(256,300)">
    <path d="M 0 -54 L 26 60 L 0 30 Z" fill="#FF7A1A"/>
    <path d="M 0 -54 L -26 60 L 0 30 Z" fill="#FFFFFF"/>
  </g>
</svg>
